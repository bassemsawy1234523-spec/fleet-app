<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأسطول الذهبي - الكابتن</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">

    <style>
        :root {
            --gold: #f1c40f; --blue: #1e3c72; --dark: #0a0a0a;
            --c-total: #e3f2fd; --c-share: #e8f5e9; --c-draw: #ffebee; --c-net: #fffde7;
        }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; text-align: right; }
        
        /* شاشة الدخول */
        #loginScreen { position: fixed; inset: 0; background: var(--dark); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #1a1a1a; padding: 30px; border-radius: 25px; border: 2px solid var(--gold); width: 90%; max-width: 400px; color: white; text-align: center; }

        .app-page { display: none; padding: 15px; }
        .app-page.active { display: block; }
        .screen-header { background: linear-gradient(135deg, var(--blue), #2a5298); color: white; padding: 20px; border-radius: 0 0 25px 25px; margin: -15px -15px 20px -15px; text-align: center; }
        
        .card { border: none; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 15px; padding: 15px; background: white; }
        .hidden-box { display: none; margin-top: 10px; padding: 15px; border-radius: 12px; background: #fcfcfc; border: 1px dashed #bbb; }
        
        /* ألوان التقارير */
        .card-total { background: var(--c-total); border-right: 5px solid #2196f3; }
        .card-share { background: var(--c-share); border-right: 5px solid #4caf50; }
        .card-draw { background: var(--c-draw); border-right: 5px solid #f44336; }
        .card-balance { background: var(--c-net); border-right: 5px solid #fbc02d; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; z-index: 1000; height: 70px; }
        .nav-item { flex: 1; text-align: center; color: #777; padding: 10px; cursor: pointer; font-size: 12px; }
        .nav-item.active { color: var(--blue); font-weight: bold; border-top: 3px solid var(--blue); }
        
        .trip-item { font-size: 12px; border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <h2 style="color:var(--gold)">الأسطول الذهبي</h2>
        <div class="text-end mb-3"><label class="small text-secondary">الكابتن</label><select id="driverSelect" class="form-select bg-dark text-white border-secondary"></select></div>
        <div class="text-end mb-4"><label class="small text-secondary">السيارة</label><select id="carSelect" class="form-select bg-dark text-white border-secondary"></select></div>
        <button class="btn btn-warning w-100 py-3 fw-bold" onclick="showPassModal()">دخول النظام</button>
    </div>
</div>

<div id="tripPage" class="app-page active">
    <div class="screen-header"><h5>تسجيل رحلة</h5></div>
    
    <div class="card" style="border-top: 4px solid var(--gold);">
        <label class="fw-bold mb-1">💰 سعر الرحلة</label>
        <input type="number" id="price" class="form-control mb-3" placeholder="0.00">
        
        <label class="fw-bold mb-1">📍 حالة الرحلة</label>
        <select id="status" class="form-select mb-2" onchange="updateLocs()">
            <option value="">اختر...</option>
            <option value="single">ذهاب فقط</option>
            <option value="return">عودة فقط</option>
            <option value="both">ذهاب وعودة</option>
            <option value="internal">شغل داخلي</option>
        </select>
        <div id="locBox" class="row g-2"></div>
    </div>

    <div class="card" style="border-top: 4px solid #2196f3;">
        <label class="fw-bold mb-1">💳 الدفع</label>
        <select id="pay" class="form-select mb-2" onchange="updatePayUI()">
            <option value="cash">كاش</option>
            <option value="instapay">انستا باي</option>
            <option value="wallet">محفظة</option>
        </select>
        <div id="payBox" class="hidden-box"></div>

        <label class="fw-bold mt-3 mb-1">📱 التطبيق</label>
        <select id="app" class="form-select mb-2" onchange="updateAppUI()">
            <option value="uber">أوبر</option>
            <option value="indriver">إندريفر</option>
            <option value="didi">ديدي</option>
            <option value="private">رحلة خاصة</option>
        </select>
        <div id="appBox" class="hidden-box"></div>
    </div>

    <div class="card" style="border-top: 4px solid #f44336;">
        <label class="fw-bold mb-1">⛽ المصروفات</label>
        <div id="expList">
            <div class="input-group mb-2 exp-row">
                <select class="form-select exp-type"><option value="fuel">بنزين</option><option value="food">أكل</option><option value="toll">كارتة</option><option value="oil">زيت</option><option value="maintenance">صيانة</option><option value="cash_out">سحب نقدي</option><option value="other">أخرى</option></select>
                <input type="number" class="form-control exp-val" placeholder="0">
            </div>
        </div>
        <button class="btn btn-sm btn-outline-danger w-100 mt-1" onclick="addExp()">+ بند مصروفات</button>
    </div>

    <button class="btn btn-primary w-100 py-3 fw-bold shadow mb-5" onclick="saveTrip()">حفظ وإرسال البيانات</button>
</div>

<div id="reportsPage" class="app-page">
    <div class="screen-header"><h5>التقارير والحسابات</h5></div>
    <div class="row g-2 mb-3">
        <div class="col-6"><div class="card card-total text-center p-2"><h6>إيراد السيارة</h6><b id="r_total">0</b></div></div>
        <div class="col-6"><div class="card card-share text-center p-2"><h6>نسبتي</h6><b id="r_share">0</b></div></div>
        <div class="col-6"><div class="card card-draw text-center p-2"><h6>سحوبات</h6><b id="r_draw">0</b></div></div>
        <div class="col-6"><div class="card card-balance text-center p-2"><h6>باقي لي</h6><b id="r_net">0</b></div></div>
    </div>
    
    <div class="card p-2 mb-2">
        <div class="row g-1">
            <div class="col-5"><input type="date" id="dFrom" class="form-control form-control-sm"></div>
            <div class="col-5"><input type="date" id="dTo" class="form-control form-control-sm"></div>
            <div class="col-2"><button class="btn btn-sm btn-primary w-100" onclick="loadStats()">🔍</button></div>
        </div>
    </div>

    <div class="card p-2">
        <h6 class="border-bottom pb-1">سجل الرحلات (السحابة)</h6>
        <div id="allTripsLog" style="max-height: 300px; overflow-y: auto;"></div>
    </div>
</div>

<div id="settingsPage" class="app-page">
    <div class="screen-header"><h5>حسابي</h5></div>
    <div class="card text-center">
        <img id="u_img" src="https://via.placeholder.com/100" class="rounded-circle mx-auto mb-2" width="100">
        <h5 id="u_name">باسم الصاوي</h5>
        <div class="text-end mt-2">
            <label class="small">الاسم</label><input type="text" id="pN" class="form-control mb-2">
            <label class="small">الموبايل</label><input type="text" id="pP" class="form-control mb-2">
            <label class="small">كلمة المرور</label><input type="password" id="pPass" class="form-control mb-3">
            <button class="btn btn-warning w-100 fw-bold" onclick="updateProfile()">حفظ التعديلات</button>
        </div>
    </div>
</div>

<div class="bottom-nav" id="mainNav" style="display:none">
    <div class="nav-item active" onclick="nav('tripPage', this)">🚗 رحلة</div>
    <div class="nav-item" onclick="nav('reportsPage', this)">📊 تقارير</div>
    <div class="nav-item" onclick="nav('settingsPage', this)">⚙️ إعدادات</div>
</div>

<div id="pModal" class="modal" style="display:none; background:rgba(0,0,0,0.9); position:fixed; inset:0; z-index:10000; align-items:center; justify-content:center;">
    <div class="bg-dark p-4 rounded-4 border border-warning text-center" style="width:300px">
        <h6 class="text-white mb-3">أدخل كلمة السر</h6>
        <input type="password" id="pInp" class="form-control text-center mb-3">
        <button class="btn btn-warning w-100" onclick="login()">دخول</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCGQB_LcTcQ-mU9I8_YQ3p4W8k3pXQY",
    authDomain: "fleetsmart-2513b.firebaseapp.com",
    databaseURL: "https://fleetsmart-2513b-default-rtdb.firebaseio.com",
    projectId: "fleetsmart-2513b",
    storageBucket: "fleetsmart-2513b.appspot.com",
    messagingSenderId: "311199617889",
    appId: "1:311199617889:web:d14002ce4b62d233d76b20"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const GOVS = ["القاهرة", "الإسكندرية", "الجيزة", "الغربية", "الدقهلية", "البحيرة", "المنوفية", "دمياط", "سوهاج", "قنا", "أسوان"];

// --- 1. إصلاح شاشة البدء والسيارات ---
function sync() {
    db.ref('drivers').on('value', s => {
        let h = '<option value="">-- اختر السائق --</option>';
        s.forEach(c => h += `<option value="${c.key}">${c.val().name || c.val()}</option>`);
        document.getElementById('driverSelect').innerHTML = h;
    });
    db.ref('cars').on('value', s => {
        let h = '<option value="">-- اختر السيارة --</option>';
        s.forEach(c => {
            let v = c.val();
            let name = (typeof v === 'object') ? (v.model || v.name || Object.values(v)[0]) : v;
            h += `<option value="${c.key}">${name}</option>`;
        });
        document.getElementById('carSelect').innerHTML = h;
    });
}
sync();

function showPassModal() { document.getElementById('pModal').style.display="flex"; }
function login() {
    if(document.getElementById('pInp').value === "1234") {
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('pModal').style.display='none';
        document.getElementById('mainNav').style.display='flex';
        loadStats();
        startGPS();
    } else { alert("خطأ!"); }
}

// --- 2. إدارة الخانات والأزرار ---
function updateLocs() {
    const s = document.getElementById('status').value;
    const box = document.getElementById('locBox');
    const dl = `<datalist id="gv">${GOVS.map(g=>`<option value="${g}">`).join('')}</datalist>`;
    if(s==='single'||s==='return') box.innerHTML = `<div class="col-6"><input list="gv" id="f" class="form-control" placeholder="من"></div><div class="col-6"><input list="gv" id="t" class="form-control" placeholder="إلى"></div>${dl}`;
    else if(s) box.innerHTML = `<div class="col-12"><input list="gv" id="m" class="form-control" placeholder="المحافظة"></div>${dl}`;
}

function updatePayUI() {
    const v = document.getElementById('pay').value;
    const box = document.getElementById('payBox');
    if(v==='cash'){ box.style.display='none'; return; }
    box.style.display='block';
    box.innerHTML = `<select id="selP" class="form-select mb-2"><option>جاري التحميل...</option></select>
                     <div id="newPayFields" class="mb-2" style="display:none">
                        <input id="npN" class="form-control mb-1" placeholder="الاسم">
                        <input id="npR" class="form-control" placeholder="الرقم/الرابط">
                     </div>
                     <button class="btn btn-sm btn-success w-100" id="btnP" onclick="toggleAddPay('${v}')">+ إضافة جديد</button>`;
    loadSelectData(v==='instapay'?'accounts':'wallets', 'selP');
}

function updateAppUI() {
    const v = document.getElementById('app').value;
    const box = document.getElementById('appBox');
    if(v!=='private'){ box.style.display='none'; return; }
    box.style.display='block';
    box.innerHTML = `<select id="selC" class="form-select mb-2"><option>جاري تحميل العملاء...</option></select>
                     <div id="newCFields" class="mb-2" style="display:none">
                        <input id="ncN" class="form-control mb-1" placeholder="اسم العميل">
                        <input id="ncP" class="form-control mb-1" placeholder="رقم العميل">
                        <input id="ncL" class="form-control" placeholder="الموقع">
                     </div>
                     <button class="btn btn-sm btn-dark w-100" id="btnC" onclick="toggleAddClient()">+ إضافة عميل جديد</button>`;
    loadSelectData('clients', 'selC');
}

// --- 3. تشغيل الأزرار والحفظ ---
function loadSelectData(path, id) {
    db.ref(path).once('value', s => {
        let h = '<option value="">-- اختر من السجل --</option>';
        s.forEach(c => h += `<option value="${c.key}">${c.val().name}</option>`);
        document.getElementById(id).innerHTML = h;
    });
}

function toggleAddPay(type) {
    const f = document.getElementById('newPayFields');
    if(f.style.display==='none') f.style.display='block';
    else {
        const n = document.getElementById('npN').value, r = document.getElementById('npR').value;
        if(n) db.ref(type==='instapay'?'accounts':'wallets').push({name:n, num:r}).then(()=>updatePayUI());
    }
}

function toggleAddClient() {
    const f = document.getElementById('newCFields');
    if(f.style.display==='none') f.style.display='block';
    else {
        const n = document.getElementById('ncN').value, p = document.getElementById('ncP').value, l = document.getElementById('ncL').value;
        if(n) db.ref('clients').push({name:n, phone:p, loc:l}).then(()=>updateAppUI());
    }
}

function addExp() {
    const d = document.createElement('div'); d.className = "input-group mb-2 exp-row";
    d.innerHTML = `<select class="form-select exp-type"><option value="fuel">بنزين</option><option value="food">أكل</option><option value="cash_out">سحب</option><option value="oil">زيت</option></select><input type="number" class="form-control exp-val" placeholder="0">`;
    document.getElementById('expList').appendChild(d);
}

// --- 4. الحسابات والتقارير ---
function saveTrip() {
    const price = parseFloat(document.getElementById('price').value) || 0;
    let preCut = 0, draw = 0, others = [];
    document.querySelectorAll('.exp-row').forEach(r => {
        const t = r.querySelector('.exp-type').value, v = parseFloat(r.querySelector('.exp-val').value) || 0;
        if(['fuel','food','toll'].includes(t)) preCut += v;
        if(t === 'cash_out') draw += v;
        others.push({t, v});
    });
    let share = (price - preCut) * 0.25; 
    const data = {
        driver: document.getElementById('driverSelect').value,
        car: document.getElementById('carSelect').value,
        total: price, share, draw, time: firebase.database.ServerValue.TIMESTAMP,
        date: new Date().toISOString().split('T')[0]
    };
    db.ref('trips').push(data);
    alert("✅ تم الحفظ!"); location.reload();
}

function loadStats() {
    db.ref('trips').once('value', s => {
        let t=0, sh=0, dr=0, logHtml = "";
        s.forEach(c => {
            let d = c.val();
            if(d.driver === document.getElementById('driverSelect').value) {
                t += d.total; sh += d.share; dr += d.draw;
                logHtml += `<div class="trip-item">📅 ${d.date} | 💰 ${d.total} ج.م | 👤 نسبتي: ${d.share}</div>`;
            }
        });
        document.getElementById('r_total').innerText = t;
        document.getElementById('r_share').innerText = sh;
        document.getElementById('r_draw').innerText = dr;
        document.getElementById('r_net').innerText = sh - dr;
        document.getElementById('allTripsLog').innerHTML = logHtml;
    });
}

function startGPS() {
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(p => {
            db.ref('live_tracking/' + document.getElementById('driverSelect').value).set({
                lat: p.coords.latitude, lng: p.coords.longitude,
                speed: (p.coords.speed || 0) * 3.6, time: Date.now()
            });
        }, null, { enableHighAccuracy: true });
    }
}

function nav(id, el) {
    document.querySelectorAll('.app-page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    el.classList.add('active');
}
</script>
</body>
            </html>
