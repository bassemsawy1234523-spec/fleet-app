<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق السائق - الأسطول الذهبي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --gold: #d4af37; --navy: #050a18; --bg: #f8fafc; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding-bottom: 90px; direction: rtl; }
        
        /* شاشة البدء المحدثة */
        #login_page { position: fixed; inset: 0; background: linear-gradient(135deg, var(--navy) 0%, #1a2a44 100%); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-box { background: var(--white); padding: 25px; border-radius: 20px; width: 85%; max-width: 380px; text-align: center; border: 3px solid var(--gold); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        
        .tab-content { display: none; padding: 15px; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--white); border-radius: 18px; padding: 15px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border-right: 5px solid var(--gold); }
        h3 { color: var(--navy); font-size: 15px; margin: 0 0 12px 0; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--navy); font-size: 12px; }
        input, select { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; font-size: 14px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); background: #fffdf9; }

        .btn-main { background: var(--navy); color: var(--gold); border: 2px solid var(--gold); padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-plus { background: var(--gold); color: var(--navy); border: none; padding: 8px 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy); display: flex; justify-content: space-around; padding: 10px 0; border-top: 3px solid var(--gold); z-index: 1000; }
        .nav-item { color: #fff; opacity: 0.5; text-align: center; flex: 1; cursor: pointer; font-size: 10px; }
        .nav-item.active { opacity: 1; color: var(--gold); }
        .nav-item i { font-size: 22px; margin-bottom: 5px; }

        .report-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .summary-item { background: var(--navy); color: var(--gold); padding: 12px; border-radius: 15px; text-align: center; border-bottom: 3px solid var(--gold); }
        .summary-item b { font-size: 18px; display: block; }
        .hidden-box { display: none; background: #fdfaf3; padding: 12px; border-radius: 12px; border: 1px dashed var(--gold); margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login_page">
        <div class="login-box">
            <h2 style="color: var(--navy); margin-bottom: 20px;">الأسطول الذهبي ✨</h2>
            <label>اسم السائق</label>
            <select id="sel_driver" onkeydown="nextField(event, 'sel_car')"></select>
            <br><br>
            <label>السيارة</label>
            <select id="sel_car" onkeydown="nextField(event, 'login_pass')"></select>
            <br><br>
            <label>كلمة السر</label>
            <input type="password" id="login_pass" placeholder="1234" onkeydown="nextField(event, 'btn_login')">
            <button id="btn_login" class="btn-main" onclick="doLogin()">دخول للعمل <i class="fas fa-steering-wheel"></i></button>
        </div>
    </div>

    <div id="app" style="display:none;">
        
        <div id="tab_trip" class="tab-content active">
            <div class="card">
                <h3><i class="fas fa-route"></i> تسجيل رحلة</h3>
                <label>السعر الإجمالي للرحلة</label>
                <input type="number" id="t_price" placeholder="0.00" onkeydown="nextField(event, 't_date')">
                
                <label style="margin-top:10px;">التاريخ والوقت</label>
                <input type="datetime-local" id="t_date" onkeydown="nextField(event, 't_status')">

                <label style="margin-top:10px;">حالة الرحلة</label>
                <select id="t_status" onchange="toggleLocFields(this.value)">
                    <option value="ذهاب وعوده">ذهاب وعودة (محافظة واحدة)</option>
                    <option value="ذهاب فقط">ذهاب فقط (محافظتين)</option>
                    <option value="عوده فقط">عودة فقط (محافظتين)</option>
                    <option value="شغل داخلي">شغل داخلي (محافظة واحدة)</option>
                </select>

                <div id="loc_section" class="hidden-box" style="display:block;">
                    <label>الوجهة (المحافظة)</label>
                    <input type="text" list="provinces" id="loc1" placeholder="بحث...">
                    <div id="loc2_div" style="display:none; margin-top:10px;">
                        <label>إلى (المحافظة الثانية)</label>
                        <input type="text" list="provinces" id="loc2" placeholder="بحث...">
                    </div>
                </div>

                <label style="margin-top:10px;">طريقة الدفع</label>
                <select id="t_pay" onchange="togglePayFields(this.value)">
                    <option>كاش</option><option>محفظة</option><option>إنستا باي</option>
                </select>
                <div id="pay_details" class="hidden-box">
                    <div style="display:flex; gap:5px;">
                        <select id="pay_accounts" style="flex:1"></select>
                        <button class="btn-plus" onclick="addNewAccount('payment')">+</button>
                    </div>
                </div>

                <label style="margin-top:10px;">التطبيق المستخدم</label>
                <select id="t_app" onchange="toggleClientFields(this.value)">
                    <option>أوبر</option><option>إندرايفر</option><option>ديدي</option><option value="خاصة">رحلة خاصة</option>
                </select>
                <div id="client_details" class="hidden-box">
                    <div style="display:flex; gap:5px;">
                        <select id="client_list" style="flex:1"></select>
                        <button class="btn-plus" onclick="addNewAccount('client')">+</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <h3><i class="fas fa-wallet"></i> المصروفات والسحب</h3>
                <div id="expenses_container">
                    <div style="display:flex; gap:5px; margin-bottom:10px;">
                        <input type="number" class="exp-amt" placeholder="المبلغ" style="flex:1">
                        <select class="exp-type" style="flex:1" onchange="handleSiana(this)">
                            <option>بنزين</option><option>أكل وخلافه</option><option>كارتة طريق</option>
                            <option>غيار زيت</option><option value="صيانة">صيانة</option><option value="سحب">سحب نقدي</option><option>أخرى</option>
                        </select>
                    </div>
                </div>
                <div id="siana_info" class="hidden-box"><label>تفاصيل الصيانة</label><input type="text" id="s_desc"></div>
                <button onclick="addRow()" style="background:none; border:none; color:var(--gold); font-weight:bold;">+ إضافة مصروف آخر</button>
            </div>
            <button class="btn-main" onclick="uploadTrip()">حفظ وتصدير البيانات ☁️</button>
        </div>

        <div id="tab_rep" class="tab-content">
            <div class="report-summary">
                <div class="summary-item"><small>شغل السيارة</small><b id="sum_work">0</b></div>
                <div class="summary-item"><small>نسبتي المقدرة</small><b id="sum_my">0</b></div>
                <div class="summary-item"><small>سحب نقدي</small><b id="sum_draw">0</b></div>
                <div class="summary-item" style="background:var(--gold); color:var(--navy);"><small>باقي لي</small><b id="sum_net">0</b></div>
            </div>
            <div class="card">
                <h3><i class="fas fa-search"></i> كشف حساب وبحث</h3>
                <label>بحث بتاريخ معين</label><input type="date" id="search_date" onchange="loadReports()">
                <label style="margin-top:10px;">فلترة بالسيارة</label><select id="search_car" onchange="loadReports()"></select>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <button onclick="applyFilter('day')" style="flex:1; font-size:10px;">يومي</button>
                    <button onclick="applyFilter('week')" style="flex:1; font-size:10px;">أسبوعي</button>
                    <button onclick="applyFilter('month')" style="flex:1; font-size:10px;">شهري</button>
                </div>
            </div>
            <div id="trips_log"></div>
        </div>

        <div id="tab_sec" class="tab-content">
            <div class="card" style="text-align:center;">
                <div style="position:relative; display:inline-block;">
                    <img id="profile_img" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" style="width:110px; height:110px; border-radius:50%; border:3px solid var(--gold); object-fit:cover;">
                    <input type="file" id="file_in" style="display:none" onchange="updateImg(this)">
                    <i class="fas fa-camera" onclick="document.getElementById('file_in').click()" style="position:absolute; bottom:0; right:5px; background:var(--navy); color:white; padding:8px; border-radius:50%; font-size:12px; cursor:pointer;"></i>
                </div>
                <label style="margin-top:20px;">اسم السائق</label><input type="text" id="p_name">
                <label>رقم الموبايل</label><input type="tel" id="p_phone">
                <label>تغيير كلمة السر</label><input type="password" id="p_pass">
                <button class="btn-main" onclick="saveProfileChanges()">تحديث البيانات</button>
                <button class="btn-main" style="background:#cc0000; color:white; border:none; margin-top:25px;" onclick="location.reload()">تسجيل خروج آمن</button>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('tab_trip', this)"><i class="fas fa-plus-square"></i><br>جديد</div>
            <div class="nav-item" onclick="switchTab('tab_rep', this)"><i class="fas fa-chart-pie"></i><br>التقارير</div>
            <div class="nav-item" onclick="switchTab('tab_sec', this)"><i class="fas fa-user-lock"></i><br>الأمان</div>
        </div>
    </div>

    <datalist id="provinces">
        <option value="الإسكندرية"><option value="القاهرة"><option value="الجيزة"><option value="البحيرة"><option value="الدقهلية"><option value="الغربية"><option value="الشرقية"><option value="المنوفية"><option value="دمياط"><option value="بورسعيد"><option value="السويس"><option value="مطروح"><option value="قنا"><option value="أسوان">
    </datalist>

    <script>
        // إعدادات Firebase الخاصة بك
        const firebaseConfig = { apiKey: "AIzaSyAsS-q848fEIsY-Zk86pL1K6eS4C_eCisU", databaseURL: "https://fleetsmart-2513b-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = null;

        // استيراد البيانات من السحابة للقوائم
        db.ref('drivers').on('value', s => {
            const el = document.getElementById('sel_driver'); el.innerHTML = '<option value="">اختر اسمك</option>';
            s.forEach(c => { el.innerHTML += `<option value="${c.key}" data-pass="${c.val().pass || '1234'}" data-ratio="${c.val().ratio || 0}">${c.val().name}</option>`; });
        });

        db.ref('cars').on('value', s => {
            const c1 = document.getElementById('sel_car'), c2 = document.getElementById('search_car');
            c1.innerHTML = '<option value="">اختر السيارة</option>'; c2.innerHTML = '<option value="all">كل الأسطول</option>';
            s.forEach(c => { const p = c.val().plate; c1.innerHTML += `<option value="${p}">${p}</option>`; c2.innerHTML += `<option value="${p}">${p}</option>`; });
        });

        // ميزة "السهم الأزرق" للتنقل
        function nextField(e, nextId) {
            if (e.key === "Enter") {
                e.preventDefault();
                const next = document.getElementById(nextId);
                if (next.tagName === "BUTTON") next.click(); else next.focus();
            }
        }

        function doLogin() {
            const sel = document.getElementById('sel_driver');
            const pass = document.getElementById('login_pass').value;
            if (pass === sel.selectedOptions[0].dataset.pass) {
                currentUser = { 
                    id: sel.value, 
                    name: sel.selectedOptions[0].text, 
                    ratio: parseFloat(sel.selectedOptions[0].dataset.ratio) || 0, 
                    car: document.getElementById('sel_car').value 
                };
                document.getElementById('login_page').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('t_date').value = new Date().toLocaleString('sv-SE').replace(' ', 'T').slice(0, 16);
                loadReports();
            } else { alert("عذراً، كلمة السر غير صحيحة!"); }
        }

        function loadReports() {
            db.ref('trips').orderByChild('driverId').equalTo(currentUser.id).on('value', s => {
                const log = document.getElementById('trips_log');
                log.innerHTML = "<h4 style='padding-right:10px;'>سجل رحلاتك:</h4>";
                let totalWork=0, totalMyCut=0, totalDraw=0;
                const filterDate = document.getElementById('search_date').value;
                const filterCar = document.getElementById('search_car').value;

                s.forEach(c => {
                    const t = c.val();
                    const tripPrice = parseFloat(t.total) || 0;
                    
                    // المعادلة المحاسبية: خصم (بنزين، أكل، كارتة) قبل حساب النسبة
                    let expenseBeforeRatio = 0;
                    let draws = 0;
                    if(t.expenses) t.expenses.forEach(e => {
                        if(['بنزين', 'أكل وخلافه', 'كارتة طريق'].includes(e.type)) expenseBeforeRatio += parseFloat(e.amt) || 0;
                        if(e.type === 'سحب') draws += parseFloat(e.amt) || 0;
                    });

                    const netAmount = tripPrice - expenseBeforeRatio;
                    // نسبة السائق (0 إذا لم يحدد المالك نسبة بعد)
                    const myShare = (netAmount * (t.ratio || 0)) / 100;

                    if((!filterDate || t.date.includes(filterDate)) && (filterCar === 'all' || t.car === filterCar)) {
                        totalWork += tripPrice; totalMyCut += myShare; totalDraw += draws;
                        log.innerHTML += `<div class="card" style="font-size:11px;">
                            <b>🗓️ ${t.date}</b> | العربية: ${t.car}<br>
                            الرحلة: ${tripPrice} | الصافي للنسبة: ${netAmount.toFixed(1)} | نسبتي: ${myShare.toFixed(1)} | سحب: ${draws}
                        </div>`;
                    }
                });
                document.getElementById('sum_work').innerText = totalWork.toFixed(0);
                document.getElementById('sum_my').innerText = totalMyCut.toFixed(0);
                document.getElementById('sum_draw').innerText = totalDraw.toFixed(0);
                document.getElementById('sum_net').innerText = (totalMyCut - totalDraw).toFixed(0);
            });
        }

        function uploadTrip() {
            const price = parseFloat(document.getElementById('t_price').value) || 0;
            const exps = [];
            document.querySelectorAll('#expenses_container > div').forEach(row => {
                const a = parseFloat(row.querySelector('.exp-amt').value) || 0;
                const t = row.querySelector('.exp-type').value;
                if(a > 0) exps.push({amt: a, type: t});
            });

            const tripData = {
                driverId: currentUser.id, driverName: currentUser.name, car: currentUser.car,
                total: price, date: document.getElementById('t_date').value,
                ratio: currentUser.ratio, expenses: exps, timestamp: firebase.database.ServerValue.TIMESTAMP
            };

            db.ref('trips').push(tripData).then(() => {
                alert("تم إرسال البيانات للسحابة بنجاح ✅");
                location.reload();
            }).catch(err => alert("خطأ في الاتصال: " + err));
        }

        // تحكمات الواجهة
        function switchTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active'); el.classList.add('active');
        }
        function toggleLocFields(v) { document.getElementById('loc2_div').style.display = (v.includes('فقط') ? 'block' : 'none'); }
        function togglePayFields(v) { document.getElementById('pay_details').style.display = (v !== 'كاش' ? 'block' : 'none'); }
        function toggleClientFields(v) { document.getElementById('client_details').style.display = (v === 'خاصة' ? 'block' : 'none'); }
        function handleSiana(el) { document.getElementById('siana_info').style.display = (el.value === 'صيانة' ? 'block' : 'none'); }
        function addRow() {
            const div = document.createElement('div'); div.style.display = 'flex'; div.style.gap = '5px'; div.style.marginBottom = '10px';
            div.innerHTML = `<input type="number" class="exp-amt" placeholder="المبلغ" style="flex:1"><select class="exp-type" style="flex:1"><option>بنزين</option><option>أكل وخلافه</option><option>كارتة طريق</option><option>غيار زيت</option><option>صيانة</option><option value="سحب">سحب نقدي</option></select>`;
            document.getElementById('expenses_container').appendChild(div);
        }
    </script>
</body>
</html>
